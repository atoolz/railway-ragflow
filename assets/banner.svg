<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" width="1440" height="720">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="120"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="bg-radial" cx="30%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </radialGradient>
    <linearGradient id="screen-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0a2e"/>
    </linearGradient>
    <clipPath id="clip-chat">
      <rect x="0" y="0" width="280" height="200" rx="8"/>
    </clipPath>
    <clipPath id="clip-kb">
      <rect x="0" y="0" width="280" height="200" rx="8"/>
    </clipPath>
    <clipPath id="clip-agent">
      <rect x="0" y="0" width="280" height="200" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1440" height="720" fill="url(#bg-radial)"/>

  <!-- Soft ambient patches -->
  <ellipse cx="350" cy="350" rx="500" ry="400" fill="#1e293b" opacity="0.15" filter="url(#glow-soft)"/>
  <ellipse cx="1100" cy="300" rx="400" ry="350" fill="#0f172a" opacity="0.3" filter="url(#glow-soft)"/>

  <!-- Decorative arcs -->
  <ellipse cx="200" cy="0" rx="600" ry="300" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
  <ellipse cx="200" cy="0" rx="700" ry="350" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>

  <!-- Ambient glow behind screens -->
  <ellipse cx="1080" cy="360" rx="320" ry="260" fill="#7C3AED" opacity="0.05" filter="url(#glow)"/>

  <!-- ===== LEFT SIDE ===== -->

  <!-- Railway logo + "Railway Template" label -->
  <g transform="translate(120, 200)">
    <g transform="scale(1.3)" fill="#94a3b8">
      <path d="M.113 10.27A13.026 13.026 0 000 11.48h18.23c-.064-.125-.15-.237-.235-.347-3.117-4.027-4.793-3.677-7.19-3.78-.8-.034-1.34-.048-4.524-.048-1.704 0-3.555.005-5.358.01-.234.63-.459 1.24-.567 1.737h9.342v1.216H.113v.002zm18.26 2.426H.009c.02.326.05.645.094.961h16.955c.754 0 1.179-.429 1.315-.96zm-17.318 4.28s2.81 6.902 10.93 7.024c4.855 0 9.027-2.883 10.92-7.024H1.056zM11.988 0C7.5 0 3.593 2.466 1.531 6.108l4.75-.005v-.002c3.71 0 3.849.016 4.573.047l.448.016c1.563.052 3.485.22 4.996 1.364.82.621 2.007 1.99 2.712 2.965.654.902.842 1.94.396 2.934-.408.914-1.289 1.458-2.353 1.458H.391s.099.42.249.886h22.748A12.026 12.026 0 0024 12.005C24 5.377 18.621 0 11.988 0z"/>
    </g>
    <text x="44" y="22" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" fill="#94a3b8" font-weight="500" letter-spacing="1">RAILWAY TEMPLATE</text>
  </g>

  <!-- Main title -->
  <text x="120" y="310" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">RAGFlow</text>
  <text x="120" y="390" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">on Railway</text>

  <!-- Accent line -->
  <rect x="120" y="415" width="400" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Description -->
  <text x="120" y="460" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">Deep document understanding RAG engine.</text>
  <text x="120" y="490" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">Truthful Q&amp;A with citations. One-click deploy.</text>

  <!-- ===== RIGHT SIDE: App screen mockups ===== -->

  <!-- Screen 1: Chat Interface (top-left) -->
  <g transform="translate(780, 140)" filter="url(#shadow)">
    <g clip-path="url(#clip-chat)">
      <rect width="280" height="200" rx="8" fill="url(#screen-bg)"/>
      <!-- Title bar -->
      <rect width="280" height="28" fill="#1e1b4b"/>
      <circle cx="14" cy="14" r="4" fill="#ef4444" opacity="0.8"/>
      <circle cx="28" cy="14" r="4" fill="#eab308" opacity="0.8"/>
      <circle cx="42" cy="14" r="4" fill="#22c55e" opacity="0.8"/>
      <text x="140" y="18" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="500">Chat Assistant</text>
      <!-- Sidebar -->
      <rect x="0" y="28" width="60" height="172" fill="#0f0a2e"/>
      <rect x="8" y="38" width="44" height="8" rx="2" fill="#7C3AED" opacity="0.3"/>
      <rect x="8" y="52" width="44" height="8" rx="2" fill="#374151"/>
      <rect x="8" y="66" width="44" height="8" rx="2" fill="#374151"/>
      <rect x="8" y="80" width="44" height="8" rx="2" fill="#374151"/>
      <!-- Chat area -->
      <!-- User message -->
      <rect x="140" y="42" width="126" height="28" rx="6" fill="#7C3AED" opacity="0.7"/>
      <rect x="150" y="50" width="80" height="4" rx="1" fill="#ffffff" opacity="0.6"/>
      <rect x="150" y="58" width="50" height="4" rx="1" fill="#ffffff" opacity="0.4"/>
      <!-- Bot response -->
      <rect x="70" y="80" width="150" height="50" rx="6" fill="#1f2937"/>
      <rect x="80" y="88" width="100" height="4" rx="1" fill="#94a3b8" opacity="0.6"/>
      <rect x="80" y="96" width="120" height="4" rx="1" fill="#94a3b8" opacity="0.6"/>
      <rect x="80" y="104" width="90" height="4" rx="1" fill="#94a3b8" opacity="0.4"/>
      <!-- Citation badge -->
      <rect x="80" y="114" width="40" height="10" rx="3" fill="#7C3AED" opacity="0.3"/>
      <rect x="84" y="117" width="32" height="4" rx="1" fill="#a78bfa" opacity="0.6"/>
      <!-- Input bar -->
      <rect x="68" y="170" width="200" height="20" rx="6" fill="#1f2937"/>
      <rect x="76" y="177" width="60" height="4" rx="1" fill="#4b5563"/>
      <rect x="248" y="174" width="14" height="12" rx="3" fill="#7C3AED" opacity="0.6"/>
    </g>
    <!-- Label -->
    <text x="140" y="218" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Chat with Citations</text>
  </g>

  <!-- Screen 2: Knowledge Base (top-right) -->
  <g transform="translate(1100, 140)" filter="url(#shadow)">
    <g clip-path="url(#clip-kb)">
      <rect width="280" height="200" rx="8" fill="url(#screen-bg)"/>
      <!-- Title bar -->
      <rect width="280" height="28" fill="#1e1b4b"/>
      <circle cx="14" cy="14" r="4" fill="#ef4444" opacity="0.8"/>
      <circle cx="28" cy="14" r="4" fill="#eab308" opacity="0.8"/>
      <circle cx="42" cy="14" r="4" fill="#22c55e" opacity="0.8"/>
      <text x="140" y="18" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="500">Knowledge Base</text>
      <!-- Header -->
      <rect x="16" y="38" width="80" height="10" rx="2" fill="#7C3AED" opacity="0.4"/>
      <rect x="220" y="38" width="44" height="14" rx="4" fill="#7C3AED" opacity="0.6"/>
      <rect x="226" y="42" width="32" height="6" rx="1" fill="#ffffff" opacity="0.5"/>
      <!-- Document rows -->
      <g transform="translate(16, 62)">
        <!-- Doc 1 -->
        <rect width="248" height="28" rx="4" fill="#1f2937"/>
        <rect x="8" y="6" width="12" height="16" rx="2" fill="#3b82f6" opacity="0.5"/>
        <rect x="10" y="10" width="8" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
        <rect x="10" y="14" width="6" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
        <rect x="28" y="8" width="80" height="5" rx="1" fill="#e5e7eb" opacity="0.5"/>
        <rect x="28" y="16" width="50" height="4" rx="1" fill="#6b7280" opacity="0.4"/>
        <rect x="190" y="8" width="40" height="12" rx="3" fill="#22c55e" opacity="0.2"/>
        <rect x="196" y="12" width="28" height="4" rx="1" fill="#22c55e" opacity="0.5"/>
      </g>
      <g transform="translate(16, 96)">
        <!-- Doc 2 -->
        <rect width="248" height="28" rx="4" fill="#1f2937"/>
        <rect x="8" y="6" width="12" height="16" rx="2" fill="#ef4444" opacity="0.5"/>
        <rect x="10" y="10" width="8" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
        <rect x="10" y="14" width="6" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
        <rect x="28" y="8" width="100" height="5" rx="1" fill="#e5e7eb" opacity="0.5"/>
        <rect x="28" y="16" width="60" height="4" rx="1" fill="#6b7280" opacity="0.4"/>
        <rect x="190" y="8" width="40" height="12" rx="3" fill="#eab308" opacity="0.2"/>
        <rect x="196" y="12" width="28" height="4" rx="1" fill="#eab308" opacity="0.5"/>
      </g>
      <g transform="translate(16, 130)">
        <!-- Doc 3 -->
        <rect width="248" height="28" rx="4" fill="#1f2937"/>
        <rect x="8" y="6" width="12" height="16" rx="2" fill="#8b5cf6" opacity="0.5"/>
        <rect x="10" y="10" width="8" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
        <rect x="10" y="14" width="6" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
        <rect x="28" y="8" width="70" height="5" rx="1" fill="#e5e7eb" opacity="0.5"/>
        <rect x="28" y="16" width="45" height="4" rx="1" fill="#6b7280" opacity="0.4"/>
        <rect x="190" y="8" width="40" height="12" rx="3" fill="#22c55e" opacity="0.2"/>
        <rect x="196" y="12" width="28" height="4" rx="1" fill="#22c55e" opacity="0.5"/>
      </g>
      <!-- Progress bar -->
      <rect x="16" y="172" width="248" height="4" rx="2" fill="#374151"/>
      <rect x="16" y="172" width="180" height="4" rx="2" fill="#7C3AED" opacity="0.7"/>
    </g>
    <!-- Label -->
    <text x="140" y="218" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Knowledge Base</text>
  </g>

  <!-- Screen 3: Agent Workflow Editor (bottom-center) -->
  <g transform="translate(900, 400)" filter="url(#shadow)">
    <g clip-path="url(#clip-agent)">
      <rect width="280" height="200" rx="8" fill="url(#screen-bg)"/>
      <!-- Title bar -->
      <rect width="280" height="28" fill="#1e1b4b"/>
      <circle cx="14" cy="14" r="4" fill="#ef4444" opacity="0.8"/>
      <circle cx="28" cy="14" r="4" fill="#eab308" opacity="0.8"/>
      <circle cx="42" cy="14" r="4" fill="#22c55e" opacity="0.8"/>
      <text x="140" y="18" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="500">Agent Workflow</text>
      <!-- Canvas with dot grid -->
      <g opacity="0.15">
        <circle cx="30" cy="50" r="1" fill="#94a3b8"/><circle cx="60" cy="50" r="1" fill="#94a3b8"/><circle cx="90" cy="50" r="1" fill="#94a3b8"/><circle cx="120" cy="50" r="1" fill="#94a3b8"/><circle cx="150" cy="50" r="1" fill="#94a3b8"/><circle cx="180" cy="50" r="1" fill="#94a3b8"/><circle cx="210" cy="50" r="1" fill="#94a3b8"/><circle cx="240" cy="50" r="1" fill="#94a3b8"/>
        <circle cx="30" cy="80" r="1" fill="#94a3b8"/><circle cx="60" cy="80" r="1" fill="#94a3b8"/><circle cx="90" cy="80" r="1" fill="#94a3b8"/><circle cx="120" cy="80" r="1" fill="#94a3b8"/><circle cx="150" cy="80" r="1" fill="#94a3b8"/><circle cx="180" cy="80" r="1" fill="#94a3b8"/><circle cx="210" cy="80" r="1" fill="#94a3b8"/><circle cx="240" cy="80" r="1" fill="#94a3b8"/>
        <circle cx="30" cy="110" r="1" fill="#94a3b8"/><circle cx="60" cy="110" r="1" fill="#94a3b8"/><circle cx="90" cy="110" r="1" fill="#94a3b8"/><circle cx="120" cy="110" r="1" fill="#94a3b8"/><circle cx="150" cy="110" r="1" fill="#94a3b8"/><circle cx="180" cy="110" r="1" fill="#94a3b8"/><circle cx="210" cy="110" r="1" fill="#94a3b8"/><circle cx="240" cy="110" r="1" fill="#94a3b8"/>
        <circle cx="30" cy="140" r="1" fill="#94a3b8"/><circle cx="60" cy="140" r="1" fill="#94a3b8"/><circle cx="90" cy="140" r="1" fill="#94a3b8"/><circle cx="120" cy="140" r="1" fill="#94a3b8"/><circle cx="150" cy="140" r="1" fill="#94a3b8"/><circle cx="180" cy="140" r="1" fill="#94a3b8"/><circle cx="210" cy="140" r="1" fill="#94a3b8"/><circle cx="240" cy="140" r="1" fill="#94a3b8"/>
        <circle cx="30" cy="170" r="1" fill="#94a3b8"/><circle cx="60" cy="170" r="1" fill="#94a3b8"/><circle cx="90" cy="170" r="1" fill="#94a3b8"/><circle cx="120" cy="170" r="1" fill="#94a3b8"/><circle cx="150" cy="170" r="1" fill="#94a3b8"/><circle cx="180" cy="170" r="1" fill="#94a3b8"/><circle cx="210" cy="170" r="1" fill="#94a3b8"/><circle cx="240" cy="170" r="1" fill="#94a3b8"/>
      </g>
      <!-- Workflow nodes -->
      <!-- Start node -->
      <rect x="20" y="80" width="56" height="30" rx="6" fill="#7C3AED" opacity="0.6" stroke="#7C3AED" stroke-width="1"/>
      <text x="48" y="99" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle" opacity="0.9">Begin</text>
      <!-- Connection line 1 -->
      <line x1="76" y1="95" x2="100" y2="70" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
      <line x1="76" y1="95" x2="100" y2="120" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
      <!-- Retrieval node -->
      <rect x="100" y="54" width="64" height="30" rx="6" fill="#2563EB" opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
      <text x="132" y="73" font-family="'Inter', system-ui, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.9">Retrieval</text>
      <!-- Generate node -->
      <rect x="100" y="106" width="64" height="30" rx="6" fill="#059669" opacity="0.5" stroke="#10b981" stroke-width="1"/>
      <text x="132" y="125" font-family="'Inter', system-ui, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.9">Generate</text>
      <!-- Connection lines 2 -->
      <line x1="164" y1="70" x2="192" y2="95" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
      <line x1="164" y1="120" x2="192" y2="95" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
      <!-- Answer node -->
      <rect x="192" y="80" width="64" height="30" rx="6" fill="#dc2626" opacity="0.4" stroke="#ef4444" stroke-width="1"/>
      <text x="224" y="99" font-family="'Inter', system-ui, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.9">Answer</text>
      <!-- Floating toolbar -->
      <rect x="90" y="160" width="100" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="0.5"/>
      <rect x="98" y="165" width="8" height="8" rx="1.5" fill="#7C3AED" opacity="0.5"/>
      <rect x="112" y="165" width="8" height="8" rx="1.5" fill="#3b82f6" opacity="0.5"/>
      <rect x="126" y="165" width="8" height="8" rx="1.5" fill="#10b981" opacity="0.5"/>
      <rect x="140" y="165" width="8" height="8" rx="1.5" fill="#ef4444" opacity="0.5"/>
      <rect x="154" y="165" width="8" height="8" rx="1.5" fill="#eab308" opacity="0.5"/>
      <rect x="168" y="165" width="8" height="8" rx="1.5" fill="#94a3b8" opacity="0.3"/>
    </g>
    <!-- Label -->
    <text x="140" y="218" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Agent Workflow Editor</text>
  </g>

  <!-- ===== BOTTOM ===== -->

  <!-- AToolZ logo + text -->
  <g transform="translate(120, 678)">
    <g transform="scale(0.2)">
      <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="#ffffff"/>
      <text x="34" y="76" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="#000000" text-anchor="middle" dominant-baseline="middle">A</text>
      <circle cx="56" cy="76" r="3.5" fill="#000000"/>
      <text x="80" y="76" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="#000000" text-anchor="middle" dominant-baseline="middle">z</text>
    </g>
    <text x="36" y="19" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">An AToolZ Initiative</text>
  </g>
</svg>
