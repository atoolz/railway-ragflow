<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" width="1440" height="720">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="accent-warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="120"/>
    </filter>
    <filter id="glow-tight">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <radialGradient id="bg-radial" cx="30%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </radialGradient>
  </defs>

  <!-- Background: dark with subtle radial gradient -->
  <rect width="1440" height="720" fill="url(#bg-radial)"/>

  <!-- Soft ambient patches -->
  <ellipse cx="350" cy="350" rx="500" ry="400" fill="#1e293b" opacity="0.15" filter="url(#glow-soft)"/>
  <ellipse cx="1100" cy="300" rx="400" ry="350" fill="#0f172a" opacity="0.3" filter="url(#glow-soft)"/>

  <!-- Decorative arcs -->
  <ellipse cx="200" cy="0" rx="600" ry="300" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
  <ellipse cx="200" cy="0" rx="700" ry="350" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>

  <!-- Ambient glow behind logos -->
  <ellipse cx="1050" cy="360" rx="300" ry="250" fill="#7C3AED" opacity="0.04" filter="url(#glow)"/>
  <ellipse cx="400" cy="350" rx="200" ry="200" fill="#2563EB" opacity="0.02" filter="url(#glow)"/>

  <!-- ===== LEFT SIDE ===== -->

  <!-- Railway logo + "Railway Template" label -->
  <g transform="translate(120, 200)">
    <g transform="scale(1.3)" fill="#94a3b8">
      <path d="M.113 10.27A13.026 13.026 0 000 11.48h18.23c-.064-.125-.15-.237-.235-.347-3.117-4.027-4.793-3.677-7.19-3.78-.8-.034-1.34-.048-4.524-.048-1.704 0-3.555.005-5.358.01-.234.63-.459 1.24-.567 1.737h9.342v1.216H.113v.002zm18.26 2.426H.009c.02.326.05.645.094.961h16.955c.754 0 1.179-.429 1.315-.96zm-17.318 4.28s2.81 6.902 10.93 7.024c4.855 0 9.027-2.883 10.92-7.024H1.056zM11.988 0C7.5 0 3.593 2.466 1.531 6.108l4.75-.005v-.002c3.71 0 3.849.016 4.573.047l.448.016c1.563.052 3.485.22 4.996 1.364.82.621 2.007 1.99 2.712 2.965.654.902.842 1.94.396 2.934-.408.914-1.289 1.458-2.353 1.458H.391s.099.42.249.886h22.748A12.026 12.026 0 0024 12.005C24 5.377 18.621 0 11.988 0z"/>
    </g>
    <text x="44" y="22" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" fill="#94a3b8" font-weight="500" letter-spacing="1">RAILWAY TEMPLATE</text>
  </g>

  <!-- Main title -->
  <text x="120" y="310" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">RAGFlow</text>
  <text x="120" y="390" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">on Railway</text>

  <!-- Accent line -->
  <rect x="120" y="415" width="400" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Description -->
  <text x="120" y="460" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">Deep document understanding RAG engine.</text>
  <text x="120" y="490" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">Truthful Q&amp;A with citations. One-click deploy.</text>

  <!-- ===== RIGHT SIDE: Service stack visualization ===== -->

  <!-- RAGFlow main icon: document + brain metaphor -->
  <g transform="translate(830, 170)">
    <!-- Outer glow -->
    <ellipse cx="100" cy="100" rx="90" ry="90" fill="#7C3AED" opacity="0.08" filter="url(#glow-tight)"/>
    <!-- Document icon -->
    <g transform="scale(5.5)" fill="#7C3AED" opacity="0.9">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM13 3.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
      <path d="M8 12h8v1.5H8zm0 3h8v1.5H8zm0 3h5v1.5H8z" opacity="0.6"/>
    </g>
    <!-- RAG label -->
    <text x="100" y="210" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#7C3AED" font-weight="700" text-anchor="middle" letter-spacing="2" opacity="0.9">RAGFLOW</text>
    <text x="100" y="230" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">v0.24.0</text>
  </g>

  <!-- Elasticsearch icon -->
  <g transform="translate(1060, 180)">
    <g transform="scale(4)" fill="#F0BF24" opacity="0.85">
      <path d="M13.5 12c0-.8.7-1.5 1.5-1.5h7.5c.1-.7.2-1.3.2-2h-7.7c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5h7.1C20.8 2.6 17.7.5 14 .5 7.1.5 1.5 6.1 1.5 13S7.1 25.5 14 25.5c3.7 0 6.8-2.1 8.1-5h-7.1c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5h7.7c-.1-.7-.2-1.3-.2-2H15c-.8 0-1.5-.7-1.5-1.5z"/>
    </g>
    <text x="52" y="120" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#F0BF24" font-weight="600" text-anchor="middle" opacity="0.85">Elasticsearch</text>
    <text x="52" y="136" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">8.11.3</text>
  </g>

  <!-- MySQL icon -->
  <g transform="translate(1060, 370)">
    <g transform="scale(3.5)" fill="#4479A1" opacity="0.85">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
      <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
    <text x="44" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#4479A1" font-weight="600" text-anchor="middle" opacity="0.85">MySQL</text>
    <text x="44" y="116" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">8.0</text>
  </g>

  <!-- Redis icon -->
  <g transform="translate(1230, 180)">
    <g transform="scale(3.8)" fill="#DC382D" opacity="0.85">
      <path d="M24 12.398c0 1.457-4.652 3.328-10.404 3.328S3.192 13.855 3.192 12.398c0-.07.022-.139.062-.205l-.062.012v2.083c0 1.457 4.652 3.328 10.404 3.328s10.404-1.871 10.404-3.328V12.205l-.062-.012c.04.066.062.135.062.205z"/>
      <path d="M24 8.694c0 1.457-4.652 3.328-10.404 3.328S3.192 10.151 3.192 8.694c0-.07.022-.139.062-.205l-.062.012v2.083c0 1.457 4.652 3.328 10.404 3.328S24 12.041 24 10.584V8.5l-.062-.012c.04.066.062.136.062.206z"/>
      <ellipse cx="13.596" cy="5.366" rx="10.404" ry="3.328" fill="#DC382D" opacity="0.85"/>
    </g>
    <text x="48" y="120" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#DC382D" font-weight="600" text-anchor="middle" opacity="0.85">Redis</text>
    <text x="48" y="136" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">Valkey 8</text>
  </g>

  <!-- MinIO icon -->
  <g transform="translate(1230, 370)">
    <g transform="scale(3.5)" fill="#C72C48" opacity="0.85">
      <path d="M12 2l-8 4.5v11L12 22l8-4.5v-11L12 2zm6 14.25L12 19.5l-6-3.25V7.75L12 4.5l6 3.25v8.5z"/>
      <path d="M12 8l-4 2.25v4.5L12 17l4-2.25v-4.5L12 8z" opacity="0.5"/>
    </g>
    <text x="44" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#C72C48" font-weight="600" text-anchor="middle" opacity="0.85">MinIO</text>
    <text x="44" y="116" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">S3 Storage</text>
  </g>

  <!-- Connection lines between services -->
  <line x1="950" y1="300" x2="1060" y2="240" stroke="#7C3AED" stroke-width="1" opacity="0.15"/>
  <line x1="950" y1="300" x2="1060" y2="420" stroke="#7C3AED" stroke-width="1" opacity="0.15"/>
  <line x1="950" y1="300" x2="1230" y2="240" stroke="#7C3AED" stroke-width="1" opacity="0.1"/>
  <line x1="950" y1="300" x2="1230" y2="420" stroke="#7C3AED" stroke-width="1" opacity="0.1"/>

  <!-- ===== BOTTOM ===== -->

  <!-- AToolZ logo (inverted: white bg, black content) + text -->
  <g transform="translate(120, 678)">
    <g transform="scale(0.2)">
      <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="#ffffff"/>
      <text x="34" y="76" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="#000000" text-anchor="middle" dominant-baseline="middle">A</text>
      <circle cx="56" cy="76" r="3.5" fill="#000000"/>
      <text x="80" y="76" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="#000000" text-anchor="middle" dominant-baseline="middle">z</text>
    </g>
    <text x="36" y="19" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b">An AToolZ Initiative</text>
  </g>
</svg>
